def safelyConfigureGetPackages() {
  def packagesConfigured = false
  gradle.afterProject { project ->
    if (!packagesConfigured && project.hasProperty('android')) {
      packagesConfigured = true
      project.android.packagingOptions.jniLibs.useLegacyPackaging = false
    }
  }
}

safelyConfigureGetPackages()

buildscript {
  ext.safeExtGet = { prop, fallback ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle:7.4.2')
  }
}

apply plugin: 'com.android.library'
apply plugin: 'com.facebook.react'

android {
  ndkVersion rootProject.ext.ndkVersion
  compileSdkVersion safeExtGet('compileSdkVersion', 34)

  namespace "com.devicedefense"

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 21)
    targetSdkVersion safeExtGet('targetSdkVersion', 34)
    versionCode 1
    versionName "1.0.0"

    externalNativeBuild {
      cmake {
        cppFlags "-O2 -frtti -fexceptions -Wall -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared",
                  "-DANDROID_ARM_NEON=TRUE"
      }
    }

    ndk {
      abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
    }
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
    }
    debug {
      minifyEnabled false
      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
    }
  }

  externalNativeBuild {
    cmake {
      path "src/main/cpp/CMakeLists.txt"
      version "3.22.1"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation 'com.facebook.react:react-native:+'

  // RootBeer for root detection
  implementation 'com.scottyab:rootbeer:0.1.0'

  testImplementation 'junit:junit:4.13.2'
  testImplementation 'org.mockito:mockito-core:5.3.1'
}
